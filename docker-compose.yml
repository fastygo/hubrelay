services:
  bot:
    image: ${APP_IMAGE:-sshbot:main}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BOT_PROFILE_ID: ${BOT_PROFILE_ID:-tunnel-email-openai}
        BOT_DISPLAY_NAME: ${BOT_DISPLAY_NAME:-Tunnel chat + Yandex mail + OpenAI}
        BOT_HTTP_BIND: ${BOT_HTTP_BIND:-127.0.0.1:5500}
        BOT_EMAIL_ENABLED: ${BOT_EMAIL_ENABLED:-true}
        BOT_EMAIL_PROVIDER: ${BOT_EMAIL_PROVIDER:-yandex}
        BOT_EMAIL_MODE: ${BOT_EMAIL_MODE:-scaffold}
        BOT_OPENAI_ENABLED: ${BOT_OPENAI_ENABLED:-true}
        AI_PROVIDER: ${AI_PROVIDER:-openai}
        AI_API_KEY: ${AI_API_KEY:-}
        AI_BASE_URL: ${AI_BASE_URL:-}
        AI_MODEL: ${AI_MODEL:-gpt-4.1-mini}
        AI_API_MODE: ${AI_API_MODE:-chat_completions}
        CHAT_HISTORY: ${CHAT_HISTORY:-false}
        PROXY_SESSION_ENABLED: ${PROXY_SESSION_ENABLED:-true}
        PROXY_SESSION_FORCE: ${PROXY_SESSION_FORCE:-true}
    read_only: true
    tmpfs:
      - /tmp:size=8m
    environment:
      BOT_DB_FILE: /data/bot.db
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:5500:5500"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
